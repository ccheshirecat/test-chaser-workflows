name: Benchmark 2
on:
  workflow_dispatch:
    inputs:
      runner_type:
        description: 'Runner to blast'
        required: true
        default: 'all'
        type: choice
        options: [all, chaser, standard, blacksmith]

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - id: set-matrix
        run: |
          CHASER='{"id":"chaser","name":"Chaser 9950X","labels":["self-hosted","chaser"]}'
          STANDARD='{"id":"standard","name":"GitHub Standard","labels":"ubuntu-latest"}'
          BLACKSMITH='{"id":"blacksmith","name":"Blacksmith","labels":"blacksmith-2vcpu-ubuntu-2404"}'
          
          CHOICE="${{ github.event.inputs.runner_type }}"
          if [ "$CHOICE" = "all" ]; then 
            JSON="{\"include\":[$CHASER,$STANDARD,$BLACKSMITH]}"
          else
            case $CHOICE in 
              "chaser") J=$CHASER ;; 
              "standard") J=$STANDARD ;; 
              "blacksmith") J=$BLACKSMITH ;; 
            esac
            JSON="{\"include\":[$J]}"
          fi
          echo "matrix=$JSON" >> $GITHUB_OUTPUT

  run-benchmarks:
    needs: setup
    strategy:
      fail-fast: false
      matrix: ${{ fromJSON(needs.setup.outputs.matrix) }}
    runs-on: ${{ matrix.labels }}
    name: 'Bench: ${{ matrix.name }}'
    steps:
      - name: 🛠️ Setup Python Venv (Fixed NumPy)
        run: |
          python3 -m venv venv
          ./venv/bin/pip install --upgrade pip
          ./venv/bin/pip install numpy pandas scipy scikit-learn

      - name: 🚀 Zen 5 AVX-512 Compute Stress
        id: compute
        run: |
          echo "=== High-Intensity Compute (AVX-512 / Vectorization) ==="
          cat << 'EOF' > stress.py
          import numpy as np
          import time
          # Large matrix multiplication to trigger boost clocks and AVX
          size = 4000 
          a = np.random.rand(size, size).astype(np.float32)
          b = np.random.rand(size, size).astype(np.float32)
          start = time.time()
          c = np.dot(a, b)
          duration = (time.time() - start) * 1000
          print(f"RESULT={duration:.0f}ms")
          EOF
          RES=$(./venv/bin/python3 stress.py | grep RESULT= | cut -d= -f2)
          echo "compute=$RES" >> $GITHUB_OUTPUT
          echo "Matmul 4000x4000: $RES"

      - name: 📦 Real-World: Large Node.js Build
        id: build
        run: |
          echo "=== Building Next.js + Large Dependency Tree ==="
          mkdir build-test && cd build-test
          npx --yes create-next-app@latest . --typescript --tailwind --eslint --app --src-dir --import-alias "@/*" --use-npm --no-install
          START=$(date +%s%N)
          npm install --quiet
          npm run build
          END=$(date +%s%N)
          TIME=$(( (END - START) / 1000000 ))
          echo "build_time=${TIME}ms" >> $GITHUB_OUTPUT
          echo "Build finished in ${TIME}ms"

      - name: 📂 I/O: Small File "Burst" Test
        id: io
        run: |
          echo "=== 50,000 File Creation (Stresses NVMe vs Network) ==="
          mkdir burst-io && cd burst-io
          START=$(date +%s%N)
          for i in {1..50000}; do echo "bench" > $i.txt; done
          END=$(date +%s%N)
          TIME=$(( (END - START) / 1000000 ))
          echo "io_burst=${TIME}ms" >> $GITHUB_OUTPUT
          echo "50k files in ${TIME}ms"

      - name: 📊 Final Summary
        run: |
          echo "### Runner: ${{ matrix.name }} 🚀" >> $GITHUB_STEP_SUMMARY
          echo "| Metric | Value |" >> $GITHUB_STEP_SUMMARY
          echo "| --- | --- |" >> $GITHUB_STEP_SUMMARY
          echo "| **4k Matmul (Compute)** | ${{ steps.compute.outputs.compute }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **Next.js Full Build** | ${{ steps.build.outputs.build_time }} |" >> $GITHUB_STEP_SUMMARY
          echo "| **50k File I/O** | ${{ steps.io.outputs.io_burst }} |" >> $GITHUB_STEP_SUMMARY
